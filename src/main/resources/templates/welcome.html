<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <meta charset="UTF-8">
    <title>欢迎页面</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8,target-densitydpi=low-dpi" />
    <link rel="shortcut icon" type="image/x-icon" th:href="@{/favicon.ico}" />
    <link rel="stylesheet" th:href="@{/lib/layui/css/layui.css}">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/animate.min.css}">
</head>

<body>
    <div class="z-body animated fadeIn">
        <blockquote class="layui-elem-quote">欢迎：
            <span><shiro:principal property="username"/></span>！当前时间: [[${#dates.format(new java.util.Date().getTime(), 'yyyy-MM-dd HH:mm:ss')}]]</blockquote>
        <fieldset class="layui-elem-field">
            <legend>数据统计</legend>
            <div class="layui-field-box">
                <div class="layui-col-md12">
                    <div class="layui-card">
                        <div class="layui-card-body">
                            <div id="statsChart" style="width: 100%; height: 350px;"></div>
                        </div>
                    </div>
                </div>
            </div>
        </fieldset>
        <fieldset class="layui-elem-field">
            <legend>最近登录</legend>
            <div class="layui-field-box">
                <div id="main" style="width: 100%;height:400px;"></div>
            </div>
        </fieldset>
    </div>

    <script th:src="@{/lib/jquery/jquery.min.js}"></script>
    <script th:src="@{/lib/layui/layui.js}"></script>
    <script th:src="@{/js/common.js}"></script>
    <script th:src="@{/lib/echarts/echarts.min.js}"></script>

    <script type="application/javascript">
        layui.use('element', function(){
            layui.$("#main").css("width", (window.innerWidth - 100) +'px');
            var myChart = echarts.init(document.getElementById('main'));
            option = {
                title: {
                    text: '近七天登陆次数统计图',
                    left: 'center'
                },
                tooltip: {
                    trigger: 'axis',
                    axisPointer: {
                        type: 'none'
                    }
                },
                xAxis: {
                    type: 'category',
                    data:  getWeekList()
                },
                yAxis: {
                    type: 'value'
                },
                series: [{
                    data: [],
                    type: 'line'
                }]
            };
            layui.$.get('/weekLoginCount', function (data) {
                option.series[0].data = data;
                myChart.setOption(option);
            });

            initStatsChart();
        });

        function initStatsChart() {
            var statsChart = echarts.init(document.getElementById('statsChart'));
            var statsData = [
                { name: '用户数', value: [[${userCount != null ? userCount : 0}]], url: '/user/index', tabName: '用户管理' },
                { name: '角色数', value: [[${roleCount != null ? roleCount : 0}]], url: '/role/index', tabName: '角色管理' },
                { name: '菜单树', value: [[${menuCount != null ? menuCount : 0}]], url: '/menu/index', tabName: '菜单管理' },
                { name: '登录日志', value: [[${loginLogCount != null ? loginLogCount : 0}]], url: '/log/login/index', tabName: '登录日志' },
                { name: '操作日志', value: [[${sysLogCount != null ? sysLogCount : 0}]], url: '/log/sys/index', tabName: '操作日志' },
                { name: '在线人数', value: [[${userOnlineCount != null ? userOnlineCount : 0}]], url: '/online/index', tabName: '在线人数' }
            ];

            var colors = ['#009688', '#1E9FFF', '#FFB800', '#FF5722', '#5FB878', '#01AAED'];

            var option = {
                title: {
                    text: '系统数据统计',
                    left: 'center',
                    textStyle: {
                        color: '#333',
                        fontSize: 16,
                        fontWeight: 'bold'
                    }
                },
                tooltip: {
                    trigger: 'axis',
                    axisPointer: {
                        type: 'shadow'
                    },
                    formatter: function(params) {
                        var data = params[0];
                        return data.name + '<br/>数量: <strong>' + data.value + '</strong>';
                    }
                },
                grid: {
                    left: '3%',
                    right: '4%',
                    bottom: '3%',
                    top: '15%',
                    containLabel: true
                },
                xAxis: {
                    type: 'category',
                    data: statsData.map(function(item) { return item.name; }),
                    axisLabel: {
                        interval: 0,
                        rotate: 0,
                        textStyle: {
                            fontSize: 12,
                            color: '#666'
                        }
                    },
                    axisLine: {
                        lineStyle: {
                            color: '#e2e2e2'
                        }
                    }
                },
                yAxis: {
                    type: 'value',
                    minInterval: 1,
                    axisLine: {
                        show: false
                    },
                    axisTick: {
                        show: false
                    },
                    splitLine: {
                        lineStyle: {
                            color: '#f0f0f0'
                        }
                    },
                    axisLabel: {
                        textStyle: {
                            color: '#999'
                        }
                    }
                },
                series: [{
                    name: '统计数据',
                    type: 'bar',
                    barWidth: '50%',
                    data: statsData.map(function(item, index) {
                        return {
                            value: item.value,
                            itemStyle: {
                                color: colors[index % colors.length],
                                borderRadius: [4, 4, 0, 0]
                            }
                        };
                    }),
                    emphasis: {
                        itemStyle: {
                            shadowBlur: 10,
                            shadowOffsetX: 0,
                            shadowColor: 'rgba(0, 0, 0, 0.3)'
                        }
                    }
                }]
            };

            statsChart.setOption(option);

            statsChart.getZr().on('click', function(params) {
                var pointInPixel = [params.offsetX, params.offsetY];
                if (statsChart.containPixel('grid', pointInPixel)) {
                    var pointInGrid = statsChart.convertFromPixel('grid', pointInPixel);
                    var xIndex = Math.round(pointInGrid[0]);
                    if (xIndex >= 0 && xIndex < statsData.length) {
                        var clickedData = statsData[xIndex];
                        if (clickedData && clickedData.url) {
                            openTab(clickedData.tabName, clickedData.url);
                        }
                    }
                }
            });

            window.addEventListener('resize', function() {
                statsChart.resize();
            });
        }
    </script>
</body>
</html>

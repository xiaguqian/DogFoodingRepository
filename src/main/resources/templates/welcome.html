<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <meta charset="UTF-8">
    <title>欢迎页面</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8,target-densitydpi=low-dpi" />
    <link rel="shortcut icon" type="image/x-icon" th:href="@{/favicon.ico}" />
    <link rel="stylesheet" th:href="@{/lib/layui/css/layui.css}">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/animate.min.css}">
    <style>
        .chart-container {
            background-color: #fff;
            border-radius: 4px;
            padding: 20px;
            box-shadow: 0 1px 6px rgba(0,0,0,.1);
        }
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 350px;
            color: #999;
        }
        .empty-state i {
            font-size: 60px;
            color: #d9d9d9;
            margin-bottom: 15px;
        }
        .empty-state p {
            font-size: 14px;
            margin: 0;
        }
    </style>
</head>

<body>
    <div class="z-body animated fadeIn">
        <blockquote class="layui-elem-quote">欢迎：
            <span><shiro:principal property="username"/></span>！当前时间: [[${#dates.format(new java.util.Date().getTime(), 'yyyy-MM-dd HH:mm:ss')}]]</blockquote>
        <fieldset class="layui-elem-field">
            <legend>数据统计</legend>
            <div class="layui-field-box">
                <div class="layui-col-md12">
                    <div class="layui-card">
                        <div class="layui-card-body">
                            <div class="chart-container">
                                <div id="statsChart" style="width: 100%; height: 350px;"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </fieldset>
        <fieldset class="layui-elem-field">
            <legend>最近登录</legend>
            <div class="layui-field-box">
                <div id="main" style="width: 100%;height:400px;"></div>
            </div>
        </fieldset>
    </div>

    <script th:src="@{/lib/jquery/jquery.min.js}"></script>
    <script th:src="@{/lib/layui/layui.js}"></script>
    <script th:src="@{/js/common.js}"></script>
    <script th:src="@{/lib/echarts/echarts.min.js}"></script>

    <script type="application/javascript">
        layui.use('element', function(){
            layui.$("#main").css("width", (window.innerWidth - 100) +'px');
            
            var statsData = [
                { name: '用户数', value: [[${userCount}]], url: '/user/index', title: '用户管理', color: '#5470c6' },
                { name: '角色数', value: [[${roleCount}]], url: '/role/index', title: '角色管理', color: '#91cc75' },
                { name: '菜单数', value: [[${menuCount}]], url: '/menu/index', title: '菜单管理', color: '#fac858' },
                { name: '登录日志', value: [[${loginLogCount}]], url: '/log/login/index', title: '登录日志', color: '#ee6666' },
                { name: '操作日志', value: [[${sysLogCount}]], url: '/log/sys/index', title: '操作日志', color: '#73c0de' },
                { name: '在线人数', value: [[${userOnlineCount}]], url: '/online/index', title: '在线人数', color: '#3ba272' }
            ];

            var hasData = statsData.some(function(item) {
                return item.value > 0;
            });

            var statsChartDom = document.getElementById('statsChart');
            var statsChart = echarts.init(statsChartDom);

            if (!hasData) {
                statsChartDom.innerHTML = '<div class="empty-state"><i class="layui-icon layui-icon-chart"></i><p>暂无统计数据</p></div>';
            } else {
                var statsOption = {
                    title: {
                        text: '系统数据统计',
                        left: 'center',
                        textStyle: {
                            fontSize: 16,
                            fontWeight: 'bold',
                            color: '#333'
                        }
                    },
                    tooltip: {
                        trigger: 'axis',
                        axisPointer: {
                            type: 'shadow'
                        },
                        formatter: function(params) {
                            var data = params[0];
                            return data.name + ': <strong>' + data.value + '</strong>';
                        }
                    },
                    grid: {
                        left: '3%',
                        right: '4%',
                        bottom: '3%',
                        top: '15%',
                        containLabel: true
                    },
                    xAxis: {
                        type: 'category',
                        data: statsData.map(function(item) { return item.name; }),
                        axisLabel: {
                            interval: 0,
                            rotate: 0,
                            fontSize: 12,
                            color: '#666'
                        },
                        axisLine: {
                            lineStyle: {
                                color: '#ddd'
                            }
                        }
                    },
                    yAxis: {
                        type: 'value',
                        minInterval: 1,
                        axisLabel: {
                            color: '#666'
                        },
                        axisLine: {
                            lineStyle: {
                                color: '#ddd'
                            }
                        },
                        splitLine: {
                            lineStyle: {
                                color: '#f0f0f0'
                            }
                        }
                    },
                    series: [{
                        name: '数量',
                        type: 'bar',
                        barWidth: '50%',
                        data: statsData.map(function(item, index) {
                            return {
                                value: item.value,
                                itemStyle: {
                                    color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                        { offset: 0, color: item.color },
                                        { offset: 1, color: adjustColor(item.color, 30) }
                                    ]),
                                    borderRadius: [4, 4, 0, 0]
                                }
                            };
                        }),
                        emphasis: {
                            itemStyle: {
                                shadowBlur: 10,
                                shadowOffsetX: 0,
                                shadowColor: 'rgba(0, 0, 0, 0.3)'
                            }
                        },
                        label: {
                            show: true,
                            position: 'top',
                            color: '#666',
                            fontSize: 12,
                            fontWeight: 'bold'
                        }
                    }]
                };

                statsChart.setOption(statsOption);

                statsChart.on('click', function(params) {
                    var index = params.dataIndex;
                    var item = statsData[index];
                    if (item.url) {
                        openTab(item.title, item.url);
                    }
                });

                statsChartDom.style.cursor = 'pointer';
            }

            var myChart = echarts.init(document.getElementById('main'));
            option = {
                title: {
                    text: '近七天登陆次数统计图',
                    left: 'center'
                },
                tooltip: {
                    trigger: 'axis',
                    axisPointer: {
                        type: 'none'
                    }
                },
                xAxis: {
                    type: 'category',
                    data: getWeekList()
                },
                yAxis: {
                    type: 'value'
                },
                series: [{
                    data: [],
                    type: 'line'
                }]
            };
            layui.$.get('/weekLoginCount', function (data) {
                option.series[0].data = data;
                myChart.setOption(option);
            });

            window.addEventListener('resize', function() {
                statsChart.resize();
                myChart.resize();
            });
        });

        function adjustColor(color, amount) {
            var hex = color.replace('#', '');
            var r = parseInt(hex.substring(0, 2), 16);
            var g = parseInt(hex.substring(2, 4), 16);
            var b = parseInt(hex.substring(4, 6), 16);
            
            r = Math.min(255, Math.max(0, r + amount));
            g = Math.min(255, Math.max(0, g + amount));
            b = Math.min(255, Math.max(0, b + amount));
            
            return '#' + 
                r.toString(16).padStart(2, '0') + 
                g.toString(16).padStart(2, '0') + 
                b.toString(16).padStart(2, '0');
        }
    </script>
</body>
</html>
